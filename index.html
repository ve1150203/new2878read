<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動線上題庫</title>
    <base href="./"> 
    <style>
        :root { --primary: #2b6cb0; --success-bg: #e6fffa; --success-border: #319795; --success-text: #234e52; --bg: #f7fafc; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background-color: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        /* 強制設定 panel 的寬度與對齊，確保在任何螢幕都不會跑版 */
        .top-panel { background: white; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000; width: 100%; max-width: 600px; margin: 0 auto; }
        .container { flex: 1; overflow-y: auto; max-width: 600px; margin: 0 auto; padding: 15px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        select, button, input { padding: 12px; border-radius: 6px; border: 1px solid #cbd5e0; font-size: 1rem; font-weight: bold; }
        select { flex: 1; }
        .btn-main { background: var(--primary); color: white; border: none; cursor: pointer; flex: 1; }
        .btn-toggle { background: #4a5568; color: white; border: none; cursor: pointer; flex: 1; }
        .btn-resume { background: #dd6b20; color: white; border: none; cursor: pointer; flex: 1; display: none; }
        .quiz-card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 8px; border-left: 5px solid #cbd5e0; cursor: pointer; }
        .show-ans .is-correct { background-color: var(--success-bg) !important; color: var(--success-text) !important; border-left: 4px solid var(--success-border); }
    </style>
</head>
<body>
    <div class="top-panel">
        <select id="course-select" onchange="changeFilter()"></select>
        <div class="row" style="margin-top:10px;">
            <input type="number" id="search-input" placeholder="題號" style="flex:1;">
            <button class="btn-main" onclick="jumpToId()">直跳該題</button>
        </div>
        <div class="row">
            <button id="resume-btn" class="btn-resume" onclick="loadSaved()">↩️ 續讀上次</button>
            <button class="btn-toggle" onclick="toggleAll()">👁️ 顯/隱全部</button>
        </div>
    </div>
    <div class="container" id="scroll-cont">
        <div id="list"></div>
        <div style="display:flex; justify-content:space-between; margin-top:20px; padding-bottom:30px;">
            <button onclick="changePage(-1)">上一頁</button>
            <div id="page-info" style="align-self:center; font-weight:bold;">第 1 頁</div>
            <button onclick="changePage(1)">下一頁</button>
        </div>
    </div>
    <script src="questions.js" charset="UTF-8"></script>
    <script>
        // 這裡的邏輯與你本地端測試成功的一模一樣
        // ... (保持原本的 JS 邏輯不變)
        // [為了節省篇幅，請將原本程式碼的 JS 部分貼入此處]
    </script>
</body>
</html>

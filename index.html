<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>行動題庫</title>
    <style>
        .quiz-card { border: 1px solid #ccc; padding: 10px; margin: 5px; cursor: pointer; }
        .is-correct { background-color: #e6fffa; }
        .hidden-ans .is-correct { background-color: transparent; }
    </style>
</head>
<body>
    <select id="course-select" onchange="changeFilter()"></select>
    <button id="resume-btn" style="display:none;" onclick="loadSaved()">↩️ 續讀上次</button>
    <button onclick="toggleAll()">👁️ 顯/隱全部</button>
    <div id="list"></div>
    <script src="questions.js" charset="UTF-8"></script>
    <script>
        let filtered = [], page = 1;
        function getQ() { return allQuestions.filter(q => q.id && q.id !== "題號"); }
        function render() {
            const list = document.getElementById('list');
            list.innerHTML = filtered.slice((page-1)*50, page*50).map(q => `
                <div class="quiz-card" onclick="save(this, '${q.id}')">
                    <b>No.${q.id} ${q.title}</b>
                    <div class="is-correct">A. ${q.a}</div><div class="is-correct">B. ${q.b}</div>
                    <div class="is-correct">C. ${q.c}</div><div class="is-correct">D. ${q.d}</div>
                </div>
            `).join('');
        }
        function save(el, id) { el.classList.toggle('hidden-ans'); localStorage.setItem('last_id', id); }
        function changeFilter() { 
            const val = document.getElementById('course-select').value;
            filtered = (val === 'all') ? getQ() : getQ().filter(q => q.course === val);
            render(); 
        }
        function loadSaved() {
            const id = localStorage.getItem('last_id');
            const q = getQ().find(i => i.id == id);
            if(q) { document.getElementById('course-select').value = q.course; changeFilter(); }
        }
        window.onload = () => {
            const data = getQ();
            const courses = [...new Set(data.map(q => q.course))];
            let html = `<option value="all">全部(${data.length}題)</option>`;
            courses.forEach(c => html += `<option value="${c}">${c}(${data.filter(q=>q.course===c).length}題)</option>`);
            document.getElementById('course-select').innerHTML = html;
            if(localStorage.getItem('last_id')) document.getElementById('resume-btn').style.display = 'inline';
            changeFilter();
        };
    </script>
</body>
</html>
